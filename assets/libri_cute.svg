<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Libri cute</title>
  <desc id="desc">Icona SVG kawaii di tre libri colorati con faccina e stelline.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1c1020" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="redCover" x1="125" y1="103" x2="374" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6b73"/>
      <stop offset="0.55" stop-color="#ff3f4c"/>
      <stop offset="1" stop-color="#d91f33"/>
    </linearGradient>
    <linearGradient id="greenCover" x1="104" y1="190" x2="379" y2="294" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78df65"/>
      <stop offset="0.58" stop-color="#39bf45"/>
      <stop offset="1" stop-color="#229c35"/>
    </linearGradient>
    <linearGradient id="blueCover" x1="86" y1="273" x2="349" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6fc7ff"/>
      <stop offset="0.55" stop-color="#3198e7"/>
      <stop offset="1" stop-color="#1673c5"/>
    </linearGradient>
    <linearGradient id="pages" x1="169" y1="160" x2="407" y2="241" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff9f4"/>
      <stop offset="0.58" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eadfd8"/>
    </linearGradient>
    <linearGradient id="pageShade" x1="274" y1="134" x2="406" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9d2d4"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff6a7"/>
      <stop offset="1" stop-color="#ffb64a"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <!-- BLUE BOOK -->
    <g transform="translate(67 256) rotate(-7 190 62)">
      <path d="M42 38c4-17 19-26 38-22l247 51c17 4 27 20 23 36l-7 30c-4 17-21 27-38 23L57 105c-18-4-28-20-24-36l9-31z" fill="#155da5" opacity="0.36"/>
      <path d="M55 26c5-19 23-31 43-27l246 52c16 4 27 20 23 36l-10 41c-4 17-21 28-38 24L73 100c-20-5-32-23-28-42l10-32z" fill="url(#blueCover)" stroke="#0f62a8" stroke-width="6"/>
      <path d="M81 40l250 52c12 2 20 14 17 26l-1 5c-3 13-16 21-29 18L71 90c-9-2-15-11-13-20l3-12c2-13 11-21 20-18z" fill="url(#pages)" stroke="#e4d4cc" stroke-width="5"/>
      <path d="M104 47l-8 47" stroke="#b8dfff" stroke-width="6" opacity="0.55"/>
      <path d="M129 52l-8 47" stroke="#b8dfff" stroke-width="5" opacity="0.38"/>
      <path d="M316 60c-25 13-40 35-44 68" fill="none" stroke="#86cffb" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M124 51c28 4 84 18 128 29" stroke="#3aa6f2" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
    </g>

    <!-- GREEN BOOK -->
    <g transform="translate(90 184) rotate(-2 190 58)">
      <path d="M43 35c5-19 23-30 43-26l247 47c17 3 28 19 25 36l-8 42c-3 17-20 29-38 25L64 113c-21-4-34-22-30-42l9-36z" fill="url(#greenCover)" stroke="#1f9931" stroke-width="6"/>
      <path d="M78 45l247 47c13 3 21 15 19 27l-1 7c-3 13-16 22-30 19L66 98c-9-2-15-11-14-20l3-14c3-13 13-21 23-19z" fill="url(#pages)" stroke="#ddd1c9" stroke-width="5"/>
      <path d="M103 49l-7 52" stroke="#b4f0ab" stroke-width="7" opacity="0.5"/>
      <path d="M130 54l-8 52" stroke="#b4f0ab" stroke-width="5" opacity="0.38"/>
      <path d="M171 37c25 6 88 20 136 30" stroke="#83ed70" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M316 67c-23 14-37 37-40 70" fill="none" stroke="#c5ffba" stroke-width="8" stroke-linecap="round" opacity="0.28"/>
    </g>

    <!-- RED BOOK -->
    <g transform="translate(103 92) rotate(8 188 65)">
      <path d="M48 45c5-22 26-35 49-30l242 49c17 4 28 20 25 37l-10 50c-4 18-22 30-40 26L69 128c-24-5-39-26-34-49l13-34z" fill="url(#redCover)" stroke="#d71f34" stroke-width="7"/>
      <path d="M105 39l-13 86" stroke="#ff8d92" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
      <path d="M133 44l-13 86" stroke="#ff8d92" stroke-width="6" stroke-linecap="round" opacity="0.32"/>
      <path d="M90 64l232 46c14 3 23 16 20 30l-2 9c-3 15-18 24-33 21L77 124c-12-2-20-14-18-26l3-15c4-15 14-22 28-19z" fill="url(#pageShade)" stroke="#e6d8d1" stroke-width="5"/>
      <path d="M98 34c38 6 151 30 214 43" stroke="#ff969b" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M302 85c-21 13-35 36-38 72" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.27"/>

      <!-- Kawaii face -->
      <g transform="rotate(-8 150 100)">
        <ellipse cx="126" cy="93" rx="14" ry="17" fill="#211622"/>
        <ellipse cx="191" cy="101" rx="14" ry="17" fill="#211622"/>
        <circle cx="121" cy="87" r="5" fill="#fff" opacity="0.9"/>
        <circle cx="186" cy="95" r="5" fill="#fff" opacity="0.9"/>
        <path d="M149 111c8 11 24 13 34 2" fill="none" stroke="#211622" stroke-width="7" stroke-linecap="round"/>
        <circle cx="101" cy="107" r="9" fill="#ff8ca2" opacity="0.75"/>
        <circle cx="215" cy="118" r="9" fill="#ff8ca2" opacity="0.75"/>
      </g>
    </g>
  </g>

  <!-- Sparkles -->
  <g>
    <path d="M76 210c16-5 21-10 26-27 5 17 10 22 27 27-17 5-22 10-27 27-5-17-10-22-26-27z" fill="url(#sparkle)"/>
    <path d="M421 158c12-4 16-8 19-20 4 12 8 16 20 20-12 4-16 8-20 20-3-12-7-16-19-20z" fill="#ffc0da"/>
    <path d="M414 292c13-4 17-9 22-22 4 13 9 18 22 22-13 4-18 9-22 22-5-13-9-18-22-22z" fill="#79d9ff"/>
    <path d="M60 311c10-3 13-7 16-17 3 10 7 14 17 17-10 3-14 7-17 17-3-10-6-14-16-17z" fill="#7ef18e"/>
    <path d="M442 232c17-5 22-11 27-28 5 17 11 23 28 28-17 5-23 11-28 28-5-17-10-23-27-28z" fill="#ffe062"/>
    <path d="M378 98c8-21 42-9 22 15-8 10-17 16-23 20-3-8-7-19 1-35z" fill="#ff85ad"/>
    <path d="M386 107c4-10 20-4 11 7-4 5-8 8-11 10-2-4-4-10 0-17z" fill="#ffb4ce" opacity="0.7"/>
    <circle cx="398" cy="231" r="5" fill="#9ba7ff"/>
    <circle cx="86" cy="264" r="4" fill="#ffe58d"/>
  </g>
</svg>
