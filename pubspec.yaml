publish_to: 'none'
environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/questions.json
